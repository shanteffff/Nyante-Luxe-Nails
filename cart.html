<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic webpage information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shop Collection | Nyante Luxe Nails</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER  -->
    <header>

        <div class="nav-container">

            <!-- Company logo -->
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/Nyante Logo.png" alt="Nyante Luxe Nails Logo">
                </a>
            </div>

            <!-- Navigation -->
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Shop Nails</a>
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
                <a href="registration.html">Register</a>
                <a href="about.html">About Us</a>
                <a href="invoicedata.html">InvoiceData</a>
                <a href="userdata.html">UserData</a>
            </nav>

        </div>

    </header>
    <main class="products-container">

        <aside class="invoice-sidebar" style="max-width:700px; margin:auto;">

            <h2>Shopping Cart</h2>

            <div class="invoice-row">

                <span><strong>Order Date:</strong></span>

                <span id="invoice-date">--/--/----</span>

            </div>

            <p style="font-size:0.9rem;font-weight:bold;margin:15px 0 10px 0;">

                Selected Items

            </p>

            <div class="cart-items-list" id="cart-items-container">

                <div style="color:#999;font-style:italic;">

                    Your cart is empty.

                </div>

            </div>

            <br>

            <button class="clear-btn" onclick="clearCart()">

                Clear Cart

            </button>

            <hr>

            <div class="invoice-row">

                <span>Subtotal:</span>

                <span id="invoice-subtotal">JMD $0.00</span>

            </div>

            <div class="invoice-row">

                <span>Tax (15% GCT):</span>

                <span id="invoice-tax">JMD $0.00</span>

            </div>

            <div class="invoice-row">

                <strong>Total:</strong>

                <strong id="invoice-total">

                    JMD $0.00

                </strong>

            </div>

            <br>

            <button class="form-btn" onclick="sendOrderEmail()">

                Proceed to Checkout

            </button>

        </aside>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>&copy; 2026 Nyante Luxe Nails. All Rights Reserved.</p>

    </footer>

    <script src="products.js"></script>

</body>

</html>
