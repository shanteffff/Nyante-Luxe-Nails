<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | Nyante Luxe Nails</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="nav-container">

            <div class="logo-area">

                <a href="index.html">

                    <img src="images/Nyante Logo.png"
                         alt="Nyante Luxe Nails Logo">

                </a>

            </div>

            <nav>

                <a href="index.html">Home</a>
                <a href="products.html" class="active">Shop Nails</a>
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
                <a href="registration.html">Register</a>
                <a href="about.html">About Us</a>
                <a href="invoicedata.html">InvoiceData</a>
                <a href="userdata.html">UserData</a>
            </nav>

        </div>

    </header>

    <!-- REGISTRATION FORM -->

    <main class="auth-container">

        <div class="auth-box">

            <h2>Create Account</h2>

            <p id="registration-message"></p>

            <form id="registration-form"
                  onsubmit="registerUser(event)">

                <div class="form-group">

                    <label for="first-name">

                        First Name

                    </label>

                    <input
                        type="text"
                        id="first-name"
                        required>

                </div>

                <div class="form-group">

                    <label for="last-name">

                        Last Name

                    </label>

                    <input
                        type="text"
                        id="last-name"
                        required>

                </div>

                <div class="form-group">

                    <label for="date-of-birth">

                        Date of Birth

                    </label>

                    <input
                        type="date"
                        id="date-of-birth"
                        required>

                </div>

                <div class="form-group">

                    <label for="gender">

                        Gender

                    </label>

                    <select id="gender" required>

                        <option value="">

                            Select Gender

                        </option>

                        <option value="Female">

                            Female

                        </option>

                        <option value="Male">

                            Male

                        </option>

                        <option value="Other">

                            Other

                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="phone-number">

                        Phone Number

                    </label>

                    <input
                        type="tel"
                        id="phone-number"
                        required>

                </div>

                <div class="form-group">

                    <label for="email-address">

                        Email Address

                    </label>

                    <input
                        type="email"
                        id="email-address"
                        required>

                </div>

                <div class="form-group">

                    <label for="registration-trn">

                        TRN

                    </label>

                    <input
                        type="text"
                        id="registration-trn"
                        placeholder="000-000-000"
                        maxlength="11"
                        required>

                </div>

                <div class="form-group">

                    <label for="registration-password">

                        Password

                    </label>

                    <input
                        type="password"
                        id="registration-password"
                        minlength="8"
                        required>

                </div>

                <div class="form-group">

                    <label for="confirm-password">

                        Confirm Password

                    </label>

                    <input
                        type="password"
                        id="confirm-password"
                        minlength="8"
                        required>

                </div>

                <button
                    type="submit"
                    class="form-btn">

                    Register

                </button>

                <button
                    type="reset"
                    class="clear-btn">

                    Clear

                </button>

            </form>

            <p class="switch-page">

                Already have an account?

                <a href="login.html">

                    Login Here

                </a>

            </p>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            &copy; 2026 Nyante Luxe Nails.
            All Rights Reserved.

        </p>

    </footer>

    <script src="auth.js"></script>

</body>

</html>
