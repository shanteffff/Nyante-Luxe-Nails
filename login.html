<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Nyante Luxe Nails</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="nav-container">

            <div class="logo-area">

                <a href="index.html">

                    <img src="images/Nyante Logo.png"
                         alt="Nyante Luxe Nails Logo">

                </a>

            </div>

            <nav>

               <a href="index.html">Home</a>
                <a href="products.html" class="active">Shop Nails</a>
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
                <a href="registration.html">Register</a>
                <a href="about.html">About Us</a>
                <a href="invoicedata.html">InvoiceData</a>
                <a href="userdata.html">UserData</a>
            </nav>

        </div>

    </header>

    <!-- LOGIN FORM -->

    <main class="auth-container">

        <div class="auth-box">

            <h2>Login</h2>

            <p id="login-message"></p>

            <form id="login-form"
                  onsubmit="loginUser(event)">

                <div class="form-group">

                    <label for="login-trn">
                        TRN
                    </label>

                    <input
                        type="text"
                        id="login-trn"
                        placeholder="000-000-000"
                        maxlength="11"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}"
                        required>

                </div>

                <div class="form-group">

                    <label for="login-password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="login-password"
                        placeholder="Enter Password"
                        required>

                </div>

                <button
                    type="submit"
                    class="form-btn">

                    Login

                </button>

                <button
                    type="reset"
                    class="clear-btn">

                    Clear

                </button>

            </form>

            <p class="switch-page">

                Don't have an account?

                <a href="registration.html">

                    Register Here

                </a>

            </p>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            &copy; 2026 Nyante Luxe Nails.
            All Rights Reserved.

        </p>

    </footer>

    <script src="auth.js"></script>

</body>

</html>
