<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic webpage information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shop Collection | Nyante Luxe Nails</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER  -->
    <header>

        <div class="nav-container">

            <!-- Company logo -->
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/Nyante Logo.png" alt="Nyante Luxe Nails Logo">
                </a>
            </div>

            <!-- Navigation -->
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Shop Nails</a>
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
                <a href="registration.html">Register</a>
                <a href="about.html">About Us</a>
                <a href="invoicedata.html">InvoiceData</a>
                <a href="userdata.html">UserData</a>
            </nav>

        </div>

    </header>
    <h1>Checkout</h1>

    <!-- Cart Summary -->
    <section>

        <h2>Shopping Cart Summary</h2>

        <table border="1" width="100%">

            <thead>

                <tr>
                    <th>Product</th>
                    <th>Price (J$)</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                </tr>

            </thead>

            <tbody id="cartSummary">

            </tbody>

        </table>

        <h3>Total: J$<span id="totalCost">0.00</span></h3>

    </section>

    <hr>

    <!-- Shipping Information -->

    <section>

        <h2>Shipping Details</h2>

        <form id="checkoutForm">

            <label>Full Name</label><br>
            <input type="text" id="customerName" required><br><br>

            <label>Shipping Address</label><br>
            <textarea id="shippingAddress" rows="4" cols="40" required></textarea><br><br>

            <label>TRN</label><br>
            <input type="text" id="trn" required><br><br>

            <label>Amount Being Paid (J$)</label><br>
            <input type="number" id="amountPaid" required><br><br>

            <button type="button" onclick="confirmCheckout()">
                Confirm
            </button>

            <button type="button" onclick="cancelCheckout()">
                Cancel
            </button>

        </form>

    </section>

    <script src="checkout.js"></script>

</body>

</html>
